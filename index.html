<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday!</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            /* خلفية بينك لامع مريحة للعين */
            background: linear-gradient(45deg, #ffb6c1, #ffc0cb, #ffb6c1);
            background-size: 200% 200%;
            animation: shine 4s ease infinite;
            transition: background 2s ease-in-out;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        @keyframes shine {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* كلاس الخلفية البينك الفاتح */
        body.light-pink {
            animation: none;
            background: #fff0f5; 
        }

        /* --- المشهد الأول (التورتة) --- */
        #scene1 {
            position: absolute;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: flex-end;
            padding-bottom: 15vh;
            transition: opacity 1.5s ease-in-out;
        }

        .cake-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
        }

        .cake-layer {
            border-radius: 10px;
            opacity: 0;
            transform: translateY(100px);
            transition: all 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .layer1 { width: 140px; height: 50px; background: #f48fb1; z-index: 3; }
        .layer2 { width: 180px; height: 50px; background: #f06292; z-index: 2; margin-top: -10px; }
        .layer3 { width: 220px; height: 50px; background: #e91e63; z-index: 1; margin-top: -10px; }

        .cake-layer.show {
            opacity: 1;
            transform: translateY(0);
        }

        .cake-candle {
            width: 12px;
            height: 40px;
            background: repeating-linear-gradient(45deg, white, white 5px, #e91e63 5px, #e91e63 10px);
            position: absolute;
            top: -40px;
            border-radius: 3px;
            opacity: 0;
            transition: opacity 0.5s ease;
        }

        .flame {
            width: 16px;
            height: 16px;
            background: #ffeb3b;
            border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
            position: absolute;
            top: -20px;
            left: -2px;
            box-shadow: 0 0 15px #ffeb3b, 0 0 30px #ff9800;
            animation: flicker 0.5s infinite alternate;
        }

        @keyframes flicker {
            0% { transform: scale(1); opacity: 0.9; }
            100% { transform: scale(1.1); opacity: 1; }
        }

        /* --- المشهد الثاني (النص والصورة) --- */
        #scene2 {
            position: absolute;
            width: 100%;
            height: 100%;
            opacity: 0;
            pointer-events: none;
            transition: opacity 1.5s ease-in-out;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        #scene2.show {
            opacity: 1;
            pointer-events: auto;
        }

        .decorations {
            position: absolute;
            top: 0;
            width: 100%;
            display: flex;
            justify-content: space-between;
            padding: 20px;
            box-sizing: border-box;
            font-size: 4rem;
            transform: translateY(-100px);
            opacity: 0;
            transition: all 1.5s ease-out;
        }

        .decorations.show {
            transform: translateY(0);
            opacity: 1;
        }

        .hbd-text {
            position: absolute;
            right: -500px;
            font-size: 6vw;
            font-weight: 900;
            color: #c2185b; /* بينك غامق */
            text-shadow: 2px 2px 10px rgba(0,0,0,0.1);
            transition: right 1.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            align-items: center;
        }

        .hbd-text.show {
            right: 10%;
        }

        .text-candle {
            position: relative;
            width: 15px;
            height: 50px;
            background: repeating-linear-gradient(45deg, white, white 5px, #c2185b 5px, #c2185b 10px);
            margin-left: 20px;
            opacity: 0;
            transition: opacity 0.5s ease;
            transform: translateY(-20px);
        }

        .photo-container {
            position: absolute;
            left: 15%;
            bottom: -500px;
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: bottom 2.5s ease-in-out;
        }

        .photo-container.show {
            bottom: 25%;
            animation: float-up 3s infinite alternate ease-in-out;
        }

        @keyframes float-up {
            0% { transform: translateY(0px); }
            100% { transform: translateY(-20px); }
        }

        .balloons {
            font-size: 5rem;
            position: absolute;
            top: -70px;
            z-index: 0;
            animation: sway 2s infinite alternate ease-in-out;
        }

        @keyframes sway {
            0% { transform: rotate(-10deg); }
            100% { transform: rotate(10deg); }
        }

        .profile-img {
            width: 250px;
            height: 250px;
            border-radius: 50%;
            object-fit: cover;
            border: 8px solid #fff;
            box-shadow: 0 10px 25px rgba(194, 24, 91, 0.3);
            z-index: 1;
        }

        .signature {
            font-family: 'Brush Script MT', 'Comic Sans MS', cursive;
            font-size: 3rem;
            color: #c2185b;
            margin-top: 15px;
            font-weight: bold;
            z-index: 1;
        }

    </style>
</head>
<body>

    <div id="scene1">
        <div class="cake-container">
            <div class="cake-candle" id="main-candle">
                <div class="flame"></div>
            </div>
            <div class="cake-layer layer1" id="layer1"></div>
            <div class="cake-layer layer2" id="layer2"></div>
            <div class="cake-layer layer3" id="layer3"></div>
        </div>
    </div>

    <div id="scene2">
        <div class="decorations" id="decorations">
            <div>🎊</div>
            <div>🎊</div>
        </div>

        <div class="hbd-text" id="hbd-text">
            Happy Birthday
            <div class="text-candle" id="text-candle">
                <div class="flame"></div>
            </div>
        </div>

        <div class="photo-container" id="photo-container">
            <div class="balloons">🎈🎈🎈</div>
            <img src="https://i.supaimg.com/d73ac461-53ca-466f-bc1e-61f2abd83dfe/3e625895-5110-4b2b-81ef-67a7ea3aea44.jpg" class="profile-img" alt="Birthday Photo">
            <div class="signature">love, Dodo</div>
        </div>
    </div>

    <script>
        // دالة لضرب الشماريخ والألعاب النارية من اليمين واليسار
        function shootFireworks(durationMillis) {
            var animationEnd = Date.now() + durationMillis;
            var defaults = { startVelocity: 30, spread: 360, ticks: 60, zIndex: 0 };

            var interval = setInterval(function() {
                var timeLeft = animationEnd - Date.now();

                if (timeLeft <= 0) {
                    return clearInterval(interval);
                }

                var particleCount = 20 * (timeLeft / durationMillis);
                // من اليسار
                confetti(Object.assign({}, defaults, { particleCount, origin: { x: 0, y: 0.6 }, colors: ['#ffc0cb', '#ff69b4', '#fff'] }));
                // من اليمين
                confetti(Object.assign({}, defaults, { particleCount, origin: { x: 1, y: 0.6 }, colors: ['#ffc0cb', '#ff69b4', '#fff'] }));
            }, 250);
        }

        window.onload = () => {
            // 1. التورتة تتجمع من تحت لفوق
            setTimeout(() => document.getElementById('layer3').classList.add('show'), 500);
            setTimeout(() => document.getElementById('layer2').classList.add('show'), 1000);
            setTimeout(() => document.getElementById('layer1').classList.add('show'), 1500);

            // 2. وضع الشمعة على التورتة
            setTimeout(() => {
                document.getElementById('main-candle').style.opacity = '1';
            }, 2200);

            // 3. ضرب شماريخ من اليمين واليسار
            setTimeout(() => {
                shootFireworks(2500);
            }, 2500);

            // 4. اختفاء المشهد الأول بشكل تدريجي وسلس
            setTimeout(() => {
                document.getElementById('scene1').style.opacity = '0';
            }, 5500);

            // 5. ظهور الخلفية البينك الفاتح وزينة الشاشة
            setTimeout(() => {
                document.body.classList.add('light-pink');
                document.getElementById('scene2').classList.add('show');
                document.getElementById('decorations').classList.add('show');
                // ضرب احتفالات مرة تانية
                shootFireworks(3000);
            }, 7000);

            // 6. كتابة Happy Birthday في يمين الشاشة
            setTimeout(() => {
                document.getElementById('hbd-text').classList.add('show');
            }, 8500);

            // 7. وضع شمعة على النص
            setTimeout(() => {
                document.getElementById('text-candle').style.opacity = '1';
            }, 10000);

            // 8. ظهور الصورة بشكل دائري مع البالونات بتطير لأعلى
            setTimeout(() => {
                document.getElementById('photo-container').classList.add('show');
            }, 11000);
        };
    </script>
</body>
</html>

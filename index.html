        </button>
    </div>

    <div class="share-action-popup" id="shareActionPopup" role="dialog" aria-modal="true" aria-labelledby="share-action-title">
        <i class="fas fa-times close-qr" id="closeShareActionBtn" aria-label="إغلاق" role="button" tabindex="0"></i>
        <h3 id="share-action-title" style="font-size: 1.1rem; font-weight: 700; margin-bottom: 5px;">مشاركة الرابط</h3>

    <div class="settings-panel" id="settingsPanel" role="dialog" aria-modal="true" aria-label="الإعدادات">
        <div id="modeToggle" class="toggle-row-btn panel-item" style="--delay: 0.1s;" role="button" tabindex="0">

                    <span id="font-size-label" style="font-size: 0.75rem;">حجم الخط</span>
                    <div style="display: flex; gap: 8px;">
                        <button class="acc-btn" id="font-increase-btn" aria-label="زيادة حجم الخط">+</button>
                        <button class="acc-btn" id="font-decrease-btn" aria-label="تقليل حجم الخط">-</button>
                    </div>
                </div>
                <div id="reset-font-container" style="display: flex; justify-content: flex-end; max-height: 0; opacity: 0; overflow: hidden; transition: all 0.4s cubic-bezier(0.22, 1, 0.36, 1);">

            <div class="acc-row acc-inner-item" style="--inner-delay: 0.2s;">
                <span id="contrast-label" style="font-size: 0.75rem;">تباين عالي</span>
                <div class="toggle-switch" id="contrastBtn" role="switch" aria-checked="false" tabindex="0">
                    <div class="toggle-knob"></div>
                </div>
            </div>
            <div class="acc-row acc-inner-item" style="--inner-delay: 0.3s;">
                <span id="invert-label" style="font-size: 0.75rem;">عكس اللون</span>
                <div class="toggle-switch" id="invertBtn" role="switch" aria-checked="false" tabindex="0">
                    <div class="toggle-knob"></div>
                </div>
            </div>
        </div>

        <div class="inner-share-btn panel-item" id="innerShareBtn" style="--delay: 0.42s;" role="button" tabindex="0">
            <span id="share-panel-text" style="font-size: 0.75rem; font-weight: 700;">مشاركة الموقع</span>
            <i class="fas fa-qrcode"></i>
        </div>

        <div class="settings-counter-wrapper panel-item" style="--delay: 0.5s;">
            <div class="glass-counter-box" id="glassCounter" role="button" tabindex="0">

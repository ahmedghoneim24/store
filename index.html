<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ahmed Store | متجر أحمد</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* تعريف الألوان للوضعين الفاتح والداكن */
        :root {
            --bg-color: #F9F9F7;
            --text-color: #1a1a1a;
            --card-bg: rgba(255, 255, 255, 0.7);
            --border-color: rgba(0, 0, 0, 0.05);
            --shadow-blur: rgba(0, 0, 0, 0.1);
        }

        body.dark-mode {
            --bg-color: #1a1a1a; 
            --text-color: #f1f1f1;
            --card-bg: rgba(45, 45, 45, 0.8);
            --border-color: rgba(255, 255, 255, 0.1);
            --shadow-blur: rgba(0, 0, 0, 0.6);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; transition: all 0.3s ease; }
        body { font-family: 'Cairo', sans-serif; background-color: var(--bg-color); color: var(--text-color); height: 100vh; overflow: hidden; }
        
        .splash { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #fff; display: flex; justify-content: center; align-items: center; z-index: 1000; animation: fadeOut 2.5s forwards; }
        .splash h1 { font-size: 1.4rem; color: #1a1a1a; font-weight: 600; } 
        @keyframes fadeOut { 0%, 70% { opacity: 1; visibility: visible; } 100% { opacity: 0; visibility: hidden; } }
        
        .container { position: relative; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; padding: 20px; opacity: 0; animation: fadeIn 1s ease-in 2.5s forwards; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* تحسين زر الإعدادات ليكون دائري ومجسم */
        .settings-container { position: absolute; top: 20px; left: 20px; z-index: 100; }
        .settings-link { 
            background: var(--card-bg); backdrop-filter: blur(10px); 
            border: 1px solid var(--border-color); border-radius: 50%; 
            width: 45px; height: 45px; display: flex; align-items: center; justify-content: center;
            color: var(--text-color); font-size: 1.3rem; cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }
        .settings-link:active { transform: scale(0.9); }
        .settings-link.rotate i { transform: rotate(90deg); }

        /* تحسين القائمة المنسدلة والأيقونات */
        .dropdown-menu { 
            position: absolute; top: 55px; left: 0; background: var(--card-bg); 
            backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            border: 1px solid var(--border-color); border-radius: 15px; 
            width: 220px; padding: 10px; 
            box-shadow: 0 10px 30px var(--shadow-blur); 
            display: none; flex-direction: column; gap: 5px; opacity: 0; transform: translateY(-10px);
        }
        .dropdown-menu.show { display: flex; opacity: 1; transform: translateY(0); }
        
        .dropdown-item { 
            padding: 12px 15px; font-size: 0.95rem; font-weight: 600; color: var(--text-color); 
            text-decoration: none; display: flex; align-items: center; justify-content: space-between; 
            cursor: pointer; border-radius: 10px; transition: background 0.2s;
        }
        .dropdown-item:hover, .dropdown-item:active { background: rgba(0,0,0,0.05); }
        body.dark-mode .dropdown-item:hover, body.dark-mode .dropdown-item:active { background: rgba(255,255,255,0.1); }
        
        /* تلوين الأيقونات */
        .dropdown-item i.fa-headset { color: #25D366; font-size: 1.1rem; }
        .dropdown-item i.fa-moon { color: #5C5CFF; font-size: 1.1rem; }
        .dropdown-item i.fa-sun { color: #FFCC00; font-size: 1.1rem; } /* للشمس في الوضع الليلي */
        .dropdown-item i.fa-undo { color: #FF9800; font-size: 1.1rem; }

        .header-title { font-size: 1.8rem; font-weight: 700; margin-bottom: 30px; display: flex; align-items: center; gap: 8px; }
        .verify-icon { color: #1DA1F2; font-size: 1.2rem; }

        .menu-grid { width: 100%; max-width: 350px; display: flex; flex-direction: column; gap: 15px; }
        .glass-btn { background: var(--card-bg); backdrop-filter: blur(10px); border: 1px solid var(--border-color); padding: 20px; border-radius: 20px; text-decoration: none; color: var(--text-color); font-weight: 600; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .glass-btn:active { transform: scale(0.96); }
        
        .footer-credit { position: fixed; bottom: 15px; font-size: 0.7rem; opacity: 0.5; text-align: center; width: 100%; }
    </style>
</head>
<body>
    <div class="splash"><h1>مرحباً بكم في جوالي</h1></div>

    <div class="container">
        <div class="settings-container">
            <div class="settings-link" id="settingsBtn"><i class="fas fa-cog"></i></div>
            <div class="dropdown-menu" id="dropdownMenu">
                <div class="dropdown-item" onclick="window.location.href='https://wa.me/201061692552'">
                    <span>خدمة العملاء</span> <i class="fas fa-headset"></i>
                </div>
                <div class="dropdown-item" id="darkModeToggle">
                    <span id="themeText">الوضع الداكن</span> <i id="themeIcon" class="fas fa-moon"></i>
                </div>
                <div class="dropdown-item" onclick="alert('سياسة الإرجاع: الاستبدال أو الاسترجاع متاح خلال 14 يوم من تاريخ الشراء بشرط عدم فتح العلبة.')">
                    <span>سياسة الإرجاع</span> <i class="fas fa-undo"></i>
                </div>
            </div>
        </div>

        <h2 class="header-title">جوالي <i class="fas fa-check-circle verify-icon"></i></h2>

        <div class="menu-grid">
            <a href="phones.html" class="glass-btn"><span>هواتف</span><i class="fas fa-chevron-left"></i></a>
            <a href="smart_devices.html" class="glass-btn"><span>أجهزة ذكية</span><i class="fas fa-chevron-left"></i></a>
            <a href="accessories.html" class="glass-btn"><span>اكسسوارات</span><i class="fas fa-chevron-left"></i></a>
        </div>
    </div>
    <div class="footer-credit">موقع تجريبي - مطور الموقع أحمد غنيم</div>

    <script>
        const btn = document.getElementById('settingsBtn');
        const menu = document.getElementById('dropdownMenu');
        const darkToggle = document.getElementById('darkModeToggle');
        const themeIcon = document.getElementById('themeIcon');
        const themeText = document.getElementById('themeText');

        // قراءة الوضع المحفوظ في المتصفح عند فتح الصفحة
        if (localStorage.getItem('theme') === 'dark') {
            document.body.classList.add('dark-mode');
            themeIcon.classList.replace('fa-moon', 'fa-sun');
            themeText.innerText = "الوضع الفاتح";
        }

        // فتح وإغلاق القائمة
        btn.onclick = (e) => {
            e.stopPropagation();
            btn.classList.toggle('rotate');
            menu.classList.toggle('show');
        };

        document.onclick = () => {
            menu.classList.remove('show');
            btn.classList.remove('rotate');
        };

        // تغيير الوضع وحفظه
        darkToggle.onclick = (e) => {
            e.stopPropagation(); // عشان القائمة متقفلش وانت بتغير المود
            document.body.classList.toggle('dark-mode');
            
            if (document.body.classList.contains('dark-mode')) {
                localStorage.setItem('theme', 'dark');
                themeIcon.classList.replace('fa-moon', 'fa-sun');
                themeText.innerText = "الوضع الفاتح";
            } else {
                localStorage.setItem('theme', 'light');
                themeIcon.classList.replace('fa-sun', 'fa-moon');
                themeText.innerText = "الوضع الداكن";
            }
        };
    </script>
</body>
</html>

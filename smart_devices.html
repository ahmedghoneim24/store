<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>الاكسسوارات | متجر أحمد</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* تعريف الألوان الموحدة للصفحة */
        :root {
            --bg-color: #F9F9F7;
            --text-color: #333;
            --card-bg: #fff;
            --header-bg: rgba(249, 249, 247, 0.8);
            --border-color: rgba(0,0,0,0.04);
            --btn-bg: #f5f5f5;
        }

        body.dark-mode {
            --bg-color: #1a1a1a;
            --text-color: #f1f1f1;
            --card-bg: #2d2d2d;
            --header-bg: rgba(26, 26, 26, 0.8);
            --border-color: rgba(255,255,255,0.05);
            --btn-bg: #3d3d3d;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; transition: background-color 0.3s, color 0.3s; }
        body { font-family: 'Cairo', sans-serif; background-color: var(--bg-color); color: var(--text-color); padding-bottom: 50px; }
        
        .page-header { position: sticky; top: 0; z-index: 100; background: var(--header-bg); backdrop-filter: blur(10px); padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border-color); }
        .back-btn { text-decoration: none; color: var(--text-color); font-weight: 600; font-size: 0.95rem; }
        
        .reviews { background: var(--card-bg); padding: 12px; margin: 15px; border-radius: 12px; text-align: center; border: 1px solid var(--border-color); }
        .stars { color: #FFCC00; font-size: 0.9rem; }
        
        .product-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; padding: 0 15px; }
        .product-card { background: var(--card-bg); border-radius: 12px; overflow: hidden; border: 1px solid var(--border-color); position: relative; }
        .product-placeholder { width: 100%; height: 130px; background-color: #262626; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .product-placeholder img { width: 100%; height: 100%; object-fit: cover; }
        
        .discount { position: absolute; top: 6px; right: 6px; background: #E03D3D; color: #fff; padding: 2px 6px; border-radius: 6px; font-size: 0.65rem; font-weight: 700; z-index: 10; }
        .details { padding: 8px; }
        .name { font-size: 0.85rem; font-weight: 600; margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: var(--text-color); }
        .new-price { color: #E03D3D; font-weight: 700; font-size: 0.95rem; }
        .old-price { text-decoration: line-through; color: #888; font-size: 0.75rem; margin-right: 3px; }
        
        .wa-btn { display: flex; align-items: center; justify-content: center; gap: 4px; background: var(--btn-bg); padding: 7px; border-radius: 8px; text-decoration: none; color: var(--text-color); font-size: 0.8rem; margin-top: 8px; border: 1px solid var(--border-color); }
        .wa-btn:active { opacity: 0.7; }
        .wa-btn i { color: #25D366; font-size: 0.9rem; }
        
        .footer { text-align: center; font-size: 0.7rem; opacity: 0.4; margin-top: 30px; color: var(--text-color); }
    </style>
</head>
<body>
    <script>
        if (localStorage.getItem('theme') === 'dark') {
            document.body.classList.add('dark-mode');
        }
    </script>

    <header class="page-header">
        <div class="page-title" style="font-size: 1.1rem; font-weight: 700;">قسم الاكسسوارات</div>
        <a href="index.html" class="back-btn"><i class="fas fa-chevron-right"></i> الرئيسية</a>
    </header>

    <div class="reviews">
        <div class="stars"><i class="fas fa-star"></i><i class="fas fa-star"></i><i class="fas fa-star"></i><i class="fas fa-star"></i><i class="fas fa-star"></i></div>
        <div style="font-size: 0.75rem; font-weight: 600; margin-top: 3px;">تقييم العملاء (5/5)</div>
    </div>

    <div class="product-grid" id="products-container"></div>

    <div class="footer">جميع الحقوق محفوظة لمطور الموقع أحمد غنيم</div>

    <script>
        const products = [
            {
                name: "سماعة ايربودز برو",
                newPrice: "8000",
                oldPrice: "10000",
                discount: "خصم 20%",
                image: "https://via.placeholder.com/300x300/262626/FFFFFF?text=صورة+سماعة",
                whatsappText: "اريد شراء سماعة ايربودز برو"
            },
            {
                name: "شاحن سامسونج أصلي 45W",
                newPrice: "1200",
                oldPrice: "1500",
                discount: "خصم 20%",
                image: "https://via.placeholder.com/300x300/262626/FFFFFF?text=صورة+شاحن",
                whatsappText: "اريد شراء شاحن سامسونج أصلي 45W"
            },
            {
                name: "جراب سيليكون ايفون",
                newPrice: "350",
                oldPrice: "500",
                discount: "خصم 30%",
                image: "https://via.placeholder.com/300x300/262626/FFFFFF?text=صورة+جراب",
                whatsappText: "اريد شراء جراب سيليكون ايفون"
            }
        ];

        const container = document.getElementById('products-container');
        let htmlContent = '';
        
        products.forEach(product => {
            htmlContent += `
            <div class="product-card">
                <span class="discount">${product.discount}</span>
                <div class="product-placeholder">
                    <img src="${product.image}" alt="${product.name}">
                </div>
                <div class="details">
                    <div class="name" title="${product.name}">${product.name}</div>
                    <div class="prices">
                        <span class="new-price">${product.newPrice} ج.م</span>
                        <span class="old-price">${product.oldPrice}</span>
                    </div>
                    <a href="https://wa.me/201061692552?text=${product.whatsappText}" class="wa-btn">
                        <i class="fab fa-whatsapp"></i> واتساب
                    </a>
                </div>
            </div>
            `;
        });

        container.innerHTML = htmlContent;
    </script>
</body>
</html>
